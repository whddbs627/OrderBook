server:
  port: 8086

spring:
  application:
    name: market-data-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orderbook}
    username: ${DB_USERNAME:orderbook}
    password: ${DB_PASSWORD:orderbook}
  flyway:
    table: flyway_schema_history_market_data_service
    baseline-on-migrate: true
    baseline-version: 0
  jooq:
    sql-dialect: postgres
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: market-data-service
      auto-offset-reset: earliest
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
