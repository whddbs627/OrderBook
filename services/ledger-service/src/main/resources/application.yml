server:
  port: 8084

spring:
  application:
    name: ledger-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orderbook}
    username: ${DB_USERNAME:orderbook}
    password: ${DB_PASSWORD:orderbook}
  flyway:
    table: flyway_schema_history_ledger_service
    baseline-on-migrate: true
    baseline-version: 0
  jooq:
    sql-dialect: postgres
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ledger-service
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
