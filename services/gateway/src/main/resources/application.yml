server:
  port: 8080

spring:
  application:
    name: gateway

services:
  order: ${ORDER_SERVICE_URL:http://localhost:8081}
  query: ${QUERY_SERVICE_URL:http://localhost:8085}
  market-data: ${MARKET_DATA_SERVICE_URL:http://localhost:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
