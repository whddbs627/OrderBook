global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8080"]
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["order-service:8081"]
  - job_name: risk-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["risk-service:8082"]
  - job_name: matching-engine
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["matching-engine:8083"]
  - job_name: ledger-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ledger-service:8084"]
  - job_name: query-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["query-service:8085"]
  - job_name: market-data-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["market-data-service:8086"]
